openapi: 3.0.0

info:
  title: Notification Service API
  version: 1.0.0

servers:
  - url: http://localhost:8000

paths:

  /api/notifications/send:
    post:
      summary: Запуск массовой рассылки
      operationId: sendNotifications

      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          description: Уникальный ключ для защиты от повторной отправки одного и того же запроса
          schema:
            type: string

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, channel, message, recipients]

              properties:
                type:
                  type: string
                  description: Тип уведомления (transactional — высокий приоритет, marketing — низкий)
                  enum: [transactional, marketing]

                channel:
                  type: string
                  description: Канал доставки уведомления
                  enum: [sms, email]

                message:
                  type: string
                  description: Текст уведомления
                  maxLength: 1000

                recipients:
                  type: array
                  description: Список получателей (email или телефон), максимум 1000
                  items:
                    type: string
                  maxItems: 1000

      responses:
        "202":
          description: Запрос принят в обработку, рассылка будет выполнена асинхронно
          content:
            application/json:
              schema:
                type: object
                properties:
                  batch_id:
                    type: string
                    format: uuid
                    description: Идентификатор батча рассылки

                  message:
                    type: string
                    example: Рассылка принята

        "400":
          description: Ошибка запроса (например, отсутствует или некорректный Idempotency-Key)

        "422":
          description: Ошибка валидации входных данных


  /api/notifications/{recipient}/history:
    get:
      summary: История уведомлений пользователя
      operationId: getNotificationHistory

      parameters:
        - name: recipient
          in: path
          required: true
          description: Email или телефон получателя уведомлений
          schema:
            type: string

        - name: page
          in: query
          required: false
          description: Номер страницы пагинации (по умолчанию 1)
          schema:
            type: integer
            example: 1
            minimum: 1

        - name: per_page
          in: query
          required: false
          description: Количество элементов на странице (по умолчанию 20)
          schema:
            type: integer
            example: 20
            minimum: 1
            maximum: 100

      responses:
        "200":
          description: Пагинированная история уведомлений пользователя
          content:
            application/json:
              schema:
                type: object
                properties:

                  current_page:
                    type: integer

                  last_page:
                    type: integer

                  per_page:
                    type: integer

                  total:
                    type: integer

                  data:
                    type: array
                    items:
                      type: object
                      properties:

                        id:
                          type: integer
                          description: Уникальный идентификатор уведомления

                        batch_id:
                          type: string
                          format: uuid
                          description: Идентификатор батча рассылки

                        channel:
                          type: string
                          enum: [sms, email]
                          description: Канал доставки

                        message:
                          type: string
                          description: Текст уведомления

                        priority:
                          type: integer
                          description: Приоритет (1 — низкий, 10 — высокий)

                        status:
                          type: string
                          enum: [queued, sent, delivered, failed]
                          description: Текущий статус доставки уведомления

                        status_label:
                          type: string
                          description: Человекочитаемое описание статуса

                        sent_at:
                          type: string
                          format: date-time
                          nullable: true
                          description: Время отправки уведомления

                        delivered_at:
                          type: string
                          format: date-time
                          nullable: true
                          description: Время подтверждения доставки

                        created_at:
                          type: string
                          format: date-time
                          description: Время создания записи

        "404":
          description: Получатель не найден
